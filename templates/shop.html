<!DOCTYPE html>
<html lang="de">
<head>
    {% from "_macros.html" import render_unit_card, render_equipment_card %}
    <meta charset="UTF-8">
    <title>Ausrüstungsladen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Ausrüstungsladen</h1>
    <p>Gold: <span id="player-gold">{{ player.gold }}</span></p>

    <div class="shop-container">
        <h2>Verfügbare Ausrüstung</h2>
        <div class="equipment-list">
            {% for item in shop_items %}
                {{ render_equipment_card(item, action='buy', player_gold=player.gold, player=player) }}
            {% endfor %}
        </div>
    </div>

    <div class="navigation">
        <a href="{{ url_for('index') }}"><button>Zurück zum Hauptmenü</button></a>
        <a href="{{ url_for('barracks') }}"><button>Zur Kaserne</button></a>
    </div>
    <script>
        document.querySelectorAll('.equipment-card form').forEach(form => {
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const action = this.action;

                fetch(action, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('player-gold').textContent = data.new_gold;
                        alert(data.message); // Or use a more sophisticated notification system
                    } else {
                        alert('Fehler: ' + data.message);
                    }
                })
                .catch(error => console.error('Error:', error));
            });
        });
    </script>
</body>
</html>
